datasets:
  facet:
    label: "FACET"
    clip_model: "ViT-B-32"
    clip_pretrained: "openai"
    dataset_root: "/data/datasets/FACET"
    emb_dir:      "/data/datasets/FACET/facet_embeddings"
    csv:          "annotations/facet_single_person.csv"
    csv_path_template: "images/{filename}"
    strip_numeric_prefix: false
    metadata_columns:
      - person_id
      - filename
      - class1
      - class2
    filter_fields:
      - field: class1
        label: "Category"
      - field: gender_presentation
        label: "Gender presentation"
        derived_type: max_vote
        derived_prefix: "gender_presentation_"
        derived_columns:
          masc: "Masculine"
          fem: "Feminine"
          non_binary: "Non-binary"
          na: "N/A"
      - field: age_presentation
        label: "Age presentation"
        derived_type: max_vote
        derived_prefix: "age_presentation_"
        derived_columns:
          young: "Young"
          middle: "Middle"
          older: "Older"
          na: "N/A"
      - field: skin_tone
        label: "Skin tone"
        derived_type: max_vote
        derived_prefix: "skin_tone_"
        derived_columns:
          "1": "Tone 1"
          "2": "Tone 2"
          "3": "Tone 3"
          "4": "Tone 4"
          "5": "Tone 5"
          "6": "Tone 6"
          "7": "Tone 7"
          "8": "Tone 8"
          "9": "Tone 9"
          "10": "Tone 10"
          na: "N/A"

  miap:
    label: "MIAP"
    clip_model: "ViT-B-32"
    clip_pretrained: "openai"
    dataset_root: "/data/datasets/MIAP"
    emb_dir:      "/data/datasets/MIAP/miap_embeddings"
    csv:          "metadata/filtered_miap.csv"
    # Images live at images/<ImageID>.jpg — no dedicated filepath column in CSV
    csv_path_template: "images/{ImageID}.jpg"
    # All rows in filtered_miap.csv are relevant; no primary-image filter needed
    strip_numeric_prefix: false
    metadata_columns:
      - ImageID
      - GenderPresentation
      - AgePresentation
      - split
      - IsOccluded
      - IsTruncated
      - IsGroupOf
      - IsDepictionOf
      - bbox_area
      - centrality
    filter_fields:
      - field: GenderPresentation
        label: "Gender presentation"
      - field: AgePresentation
        label: "Age presentation"
      - field: split
        label: "Split"

  phibe:
    label: "PHIBE"
    clip_model: "ViT-B-32"
    clip_pretrained: "openai"
    dataset_root: "/data/datasets/FHIBE/fhibe.20250716.u.gT5_rFTA_downsampled_public"
    emb_dir:      "/data/datasets/FHIBE/fhibe_embeddings"
    csv:          "data/processed/fhibe_downsampled/fhibe_downsampled.csv"
    csv_path_col: "filepath"
    primary_filter:
      column: "is_primary"
      value: "true"
    strip_numeric_prefix: true
    age_buckets:
      - ["0-12 (child)",        0,  13]
      - ["13-17 (teen)",       13,  18]
      - ["18-29 (young adult)", 18,  30]
      - ["30-49 (adult)",      30,  50]
      - ["50-64 (older adult)", 50,  65]
      - ["65+ (senior)",       65, 200]
    metadata_columns:
      - subject_id
      - age
      - pronoun
      - nationality
      - ancestry
      - apparent_skin_color
      - hairstyle
      - apparent_hair_type
      - apparent_hair_color
      - facial_hairstyle
      - apparent_left_eye_color
      - apparent_right_eye_color
      - scene
      - lighting
      - weather
      - action_body_pose
      - action_subject_object_interaction
      - camera_position
      - camera_distance
      - manufacturer
      - model
      - location_country
      - location_region
    filter_fields:
      - field: nationality
        label: "Nationality"
      - field: ancestry
        label: "Ancestry"
      - field: pronoun
        label: "Pronoun"
      - field: apparent_skin_color
        label: "Apparent skin color"
      - field: scene
        label: "Scene"
      - field: action_body_pose
        label: "Body pose"
      - field: age_bucket
        label: "Age"
        derived_from: age
        derived_type: age_bucket
